<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ vocab.feedback.end_of_semester }} — {{ subject.name }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .star-input { display: none; }
    .star-label { cursor: pointer; color: #d1d5db; transition: color 0.1s; }
    .star-label:hover, .star-label:hover ~ .star-label,
    .star-input:checked ~ .star-label { color: #fbbf24; }
    .stars { display: flex; flex-direction: row-reverse; justify-content: flex-end; gap: 4px; }
    .stars .star-input:checked ~ .star-label { color: #fbbf24; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 flex items-start justify-center pt-12 pb-16 px-4">
  <div class="w-full max-w-2xl">

    <div class="bg-indigo-600 rounded-t-2xl px-8 py-6">
      <p class="text-indigo-200 text-xs font-semibold uppercase tracking-widest mb-1">{{ vocab.feedback.end_of_semester }}</p>
      <h1 class="text-2xl font-bold text-white">{{ subject.name }}</h1>
      <p class="text-indigo-200 text-sm mt-1">{{ vocab.feedback.your_responses_help }}</p>
    </div>

    <form method="POST" action="/feedback/{{ token }}" class="space-y-0">

      {% if error %}
      <div class="bg-red-50 border-x border-red-200 px-8 py-3 text-red-700 text-sm">{{ error }}</div>
      {% endif %}

      <div class="bg-white border-x border-slate-200 px-8 py-6 border-b border-slate-100">
        <label class="block text-sm font-semibold text-slate-700 mb-3">
          {{ vocab.feedback.overall_rating }} <span class="text-red-500">*</span>
        </label>
        <div class="stars" id="star-group">
          {% for i in [5, 4, 3, 2, 1] %}
          <input class="star-input" type="radio" name="rating" id="star{{ i }}" value="{{ i }}" required />
          <label class="star-label" for="star{{ i }}">
            <svg class="w-9 h-9" fill="currentColor" viewBox="0 0 20 20">
              <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
            </svg>
          </label>
          {% endfor %}
        </div>
        <p class="text-xs text-slate-400 mt-2">{{ vocab.feedback.rating_scale }}</p>
      </div>

      <div class="bg-white border-x border-slate-200 px-8 py-6 border-b border-slate-100">
        <label for="went_well" class="block text-sm font-semibold text-slate-700 mb-2">
          {{ vocab.feedback.went_well_label }} <span class="text-red-500">*</span>
        </label>
        <textarea id="went_well" name="went_well" rows="4" required
                  placeholder="{{ vocab.feedback.went_well_placeholder }}"
                  class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent resize-none"></textarea>
      </div>

      <div class="bg-white border-x border-slate-200 px-8 py-6 border-b border-slate-100">
        <label for="went_bad" class="block text-sm font-semibold text-slate-700 mb-2">
          {{ vocab.feedback.went_bad_label }} <span class="text-red-500">*</span>
        </label>
        <textarea id="went_bad" name="went_bad" rows="4" required
                  placeholder="{{ vocab.feedback.went_bad_placeholder }}"
                  class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent resize-none"></textarea>
      </div>

      <div class="bg-white border-x border-slate-200 px-8 py-6 border-b border-slate-100">
        <label for="to_change" class="block text-sm font-semibold text-slate-700 mb-2">
          {{ vocab.feedback.to_change_label }} <span class="text-red-500">*</span>
        </label>
        <textarea id="to_change" name="to_change" rows="4" required
                  placeholder="{{ vocab.feedback.to_change_placeholder }}"
                  class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-700 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent resize-none"></textarea>
      </div>

      <div class="bg-white border-x border-b border-slate-200 rounded-b-2xl px-8 py-6 flex justify-end">
        <button type="submit"
                class="inline-flex items-center gap-2 px-6 py-2.5 rounded-lg bg-indigo-600 text-white text-sm font-semibold hover:bg-indigo-700 transition-colors">
          {{ vocab.feedback.submit_feedback }}
        </button>
      </div>

    </form>

    <p class="text-center text-xs text-slate-400 mt-4">
      {{ vocab.feedback.personal_link_note }}
    </p>
  </div>

  <script>
    const labels = document.querySelectorAll('.star-label');
    labels.forEach(label => {
      label.addEventListener('mouseover', () => {
        const val = label.htmlFor.replace('star', '');
        labels.forEach(l => {
          l.style.color = parseInt(l.htmlFor.replace('star', '')) <= parseInt(val) ? '#fbbf24' : '#d1d5db';
        });
      });
      label.addEventListener('mouseout', () => {
        labels.forEach(l => { l.style.color = ''; });
      });
    });
  </script>
</body>
</html>

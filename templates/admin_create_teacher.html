{% extends "base.html" %}
{% block title %}Add Teacher — Admin{% endblock %}
{% block breadcrumbs %}
  <span class="text-indigo-400 mx-1">/</span>
  <a href="/admin" class="text-indigo-200 hover:text-white text-sm transition">Admin</a>
  <span class="text-indigo-400 mx-1">/</span>
  <span class="text-indigo-100 text-sm font-medium">Add Teacher</span>
{% endblock %}
{% block content %}
<div class="max-w-md">
  <h1 class="text-2xl font-bold text-slate-900 mb-6">Add Teacher Account</h1>

  {% if error %}
  <div class="mb-4 rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-600">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/admin/teachers/create"
        class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 flex flex-col gap-4">
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1" for="username">Username *</label>
      <input id="username" name="username" type="text" required autocomplete="off"
             class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1" for="password">Password *</label>
      <input id="password" name="password" type="password" required minlength="8" autocomplete="new-password"
             class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
      <p class="text-xs text-slate-400 mt-1">Minimum 8 characters</p>
    </div>
    <div class="flex gap-3 pt-2">
      <button type="submit"
              class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-5 py-2 rounded-lg transition-colors">
        Create teacher
      </button>
      <a href="/admin/users"
         class="text-sm text-slate-500 hover:text-slate-700 px-4 py-2 rounded-lg border border-slate-300 transition-colors">
        Cancel
      </a>
    </div>
  </form>
</div>
{% endblock %}

[pytest]
asyncio_mode = auto
testpaths = tests/e2e
python_files = test_*.py
python_classes = Test*
python_functions = test_*
bdd_features_base_dir = tests/e2e
norecursedirs = tests/unit tests/integration
markers =
    smoke: Core happy-path scenarios
    auth: Authentication scenarios
    subject: Subject management scenarios
    enrollment: Student enrollment scenarios
    submission: Assignment submission scenarios
    analytics: Analytics dashboard scenarios
    notifications: Notification preferences scenarios
    feedback: Feedback request/response scenarios
    quiz: Quiz flow scenarios
    sad-path: Negative/error path scenarios

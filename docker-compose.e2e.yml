services:
  localstack-e2e:
    image: localstack/localstack:3
    container_name: submissions-checker-localstack-e2e
    ports:
      - "4567:4566"
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    volumes:
      - ./docker/localstack/init:/etc/localstack/init/ready.d
    healthcheck:
      test: ["CMD", "awslocal", "s3", "ls"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  postgres-e2e:
    image: postgres:16-alpine
    container_name: submissions-checker-postgres-e2e
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: submissions_checker_e2e
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  app-e2e:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: submissions-checker-app-e2e
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres-e2e:5432/submissions_checker_e2e
      - LOG_LEVEL=INFO
      - DEBUG=true
      - WATCHFILES_FORCE_POLLING=true
      - S3_ENDPOINT_URL=http://localstack-e2e:4566
      - S3_PUBLIC_BASE_URL=http://localhost:4567/submissions-checker
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - SCHEDULER_ENABLED=true
      - SECRET_KEY=e2e-test-secret-key-do-not-use-in-production
      - SMTP_HOST=localhost
      - SMTP_PORT=1025
      - SMTP_FROM=noreply@e2e.test
      - PLUGINS_DIR=/home/vampir/petProjects/submissions-checker/plugins
    env_file:
      - .env.e2e
    ports:
      - "8001:8000"
    volumes:
      - ./src:/app/src
      - ./migrations:/app/migrations
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./templates:/app/templates
      - ./static:/app/static
      - ./i18n:/app/i18n
      - ./plugins:/app/plugins
      - /var/run/docker.sock:/var/run/docker.sock
      - e2e_uploads:/app/uploads
      - /tmp:/tmp
    depends_on:
      postgres-e2e:
        condition: service_healthy
      localstack-e2e:
        condition: service_healthy
    command: uvicorn submissions_checker.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/src
    dns:
      - 8.8.8.8
      - 8.8.4.4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 60s

volumes:
  e2e_uploads:

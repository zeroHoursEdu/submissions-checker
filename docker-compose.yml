services:
  postgres:
    image: postgres:16-alpine
    container_name: submissions-checker-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: submissions_checker
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: submissions-checker-app
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/submissions_checker
      - LOG_LEVEL=INFO
      - DEBUG=true
      - WATCHFILES_FORCE_POLLING=true
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./migrations:/app/migrations
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./tmp/repos:/tmp/repos
      - ./templates:/app/templates
      - ./static:/app/static
      - ./plugins:/app/plugins
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn submissions_checker.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/src
    dns:
      - 8.8.8.8
      - 8.8.4.4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
